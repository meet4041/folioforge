services:
  - type: web
    name: folioforge-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT web_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATA_DIR
        value: /opt/render/project/src/storage
      - key: MAX_UPLOAD_MB
        value: 10
      - key: PORTFOLIO_TTL_HOURS
        value: 24
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-project.vercel.app
